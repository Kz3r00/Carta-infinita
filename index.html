<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Envelope de Mensagens Infinitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="body"></div>
            <div class="letter" id="letter">
                <p id="message">✨ Toque para abrir ✨</p>
            </div>
        </div>
        <button id="closeBtn" class="close-btn">Fechar Envelope</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
